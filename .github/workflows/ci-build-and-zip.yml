name: CI Build and Zip
on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  build-windows:
    name: Build (Windows)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup vcpkg
        id: vcpkg
        uses: microsoft/vcpkg-action@v2

      - name: Export VCPKG_ROOT
        shell: pwsh
        run: |
          Add-Content -Path $env:GITHUB_ENV -Value "VCPKG_ROOT=${{ steps.vcpkg.outputs.vcpkg-root }}"

      - name: Configure (preset)
        shell: pwsh
        run: cmake --preset default

      - name: Build and install
        shell: pwsh
        run: cmake --build --preset default --config Release --target install

      - name: Zip install directory
        shell: pwsh
        run: Compress-Archive -Path install\* -DestinationPath build-windows.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-windows
          path: build-windows.zip

  build-linux:
    name: Build (Linux)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup vcpkg
        id: vcpkg
        uses: microsoft/vcpkg-action@v2

      - name: Export VCPKG_ROOT
        run: echo "VCPKG_ROOT=${{ steps.vcpkg.outputs.vcpkg-root }}" >> $GITHUB_ENV

      - name: Configure
        run: cmake -S . -B build -DCMAKE_TOOLCHAIN_FILE=$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/install -DCMAKE_BUILD_TYPE=Release

      - name: Build and install
        run: cmake --build build --config Release --target install -- -j$(nproc)

      - name: Zip install directory
        run: zip -r build-linux.zip install

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-linux
          path: build-linux.zip

  build-ios:
    name: Build (iOS)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup vcpkg
        id: vcpkg
        uses: microsoft/vcpkg-action@v2

      - name: Export VCPKG_ROOT
        run: echo "VCPKG_ROOT=${{ steps.vcpkg.outputs.vcpkg-root }}" >> $GITHUB_ENV

      - name: Configure for iOS (Xcode)
        run: cmake -S . -B build -G Xcode -DCMAKE_TOOLCHAIN_FILE=$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake -DCMAKE_SYSTEM_NAME=iOS -DCMAKE_OSX_SYSROOT=iphoneos -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0 -DCMAKE_OSX_ARCHITECTURES=arm64 -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/install -DCMAKE_BUILD_TYPE=Release

      - name: Build and install
        run: cmake --build build --config Release --target install

      - name: Zip install directory
        run: zip -r build-ios.zip install

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-ios
          path: build-ios.zip
